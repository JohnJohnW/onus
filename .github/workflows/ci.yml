name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  web-checks:
    name: Next.js checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

  engine-checks:
    name: Python checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: onus
          POSTGRES_PASSWORD: onus_local
          POSTGRES_DB: onus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onus -d onus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Migrations run as the owner; the app (and tests) connect as the
      # non-superuser onus_app role so row-level security actually applies.
      ALEMBIC_DATABASE_URL: postgresql://onus:onus_local@localhost:5432/onus
      DATABASE_URL: postgresql://onus_app:onus_local@localhost:5432/onus
      # Token-minting tests (signup/login) need a signing secret; this is a CI-only value.
      JWT_SECRET: ci-test-secret-not-for-production-0123456789abcdef
      # Document storage writes to a real dir; the runner can't write /data, so use temp.
      STORAGE_DIR: /tmp/onus-documents
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Run migrations (schema + onus_app role + RLS)
        working-directory: engine
        run: alembic upgrade head

      - name: Run pytest
        run: |
          set +e
          pytest engine/
          code=$?
          set -e
          # pytest exit code 5 means "no tests collected". Treat it as success;
          # propagate any real failure.
          if [ "$code" -eq 5 ]; then
            echo "pytest: no tests collected - OK."
            exit 0
          fi
          exit "$code"
