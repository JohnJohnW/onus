name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  web-checks:
    name: Next.js checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

  engine-checks:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Run pytest
        run: |
          set +e
          pytest engine/
          code=$?
          set -e
          # pytest exit code 5 means "no tests collected" - expected for the
          # initial scaffold. Treat it as success; propagate any real failure.
          if [ "$code" -eq 5 ]; then
            echo "pytest: no tests collected yet - OK for initial scaffold."
            exit 0
          fi
          exit "$code"
